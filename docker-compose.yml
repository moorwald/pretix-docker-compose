# Pretix Docker Compose for Coolify
# Deploy this repo directly in Coolify - it handles SSL/Proxy via Traefik

services:
  pretix:
    image: pretix/standalone:latest
    restart: unless-stopped
    depends_on:
      - redis
      - db
    environment:
      # Instance configuration
      PRETIX_PRETIX_INSTANCE_NAME: ${PRETIX_INSTANCE_NAME:-MautiCon Tickets}
      PRETIX_PRETIX_URL: https://${PRETIX_DOMAIN:-localhost}
      PRETIX_PRETIX_CURRENCY: ${PRETIX_CURRENCY:-EUR}
      PRETIX_PRETIX_DATADIR: /data
      PRETIX_PRETIX_REGISTRATION: "off"

      # Locale
      PRETIX_LOCALE_DEFAULT: ${PRETIX_LOCALE:-en}
      PRETIX_LOCALE_TIMEZONE: ${PRETIX_TIMEZONE:-Europe/London}

      # Database - uses internal Docker network
      PRETIX_DATABASE_BACKEND: postgresql
      PRETIX_DATABASE_NAME: pretix
      PRETIX_DATABASE_USER: pretix
      PRETIX_DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      PRETIX_DATABASE_HOST: db

      # Redis
      PRETIX_REDIS_LOCATION: redis://redis:6379/0
      PRETIX_REDIS_SESSIONS: "true"
      PRETIX_CELERY_BACKEND: redis://redis:6379/1
      PRETIX_CELERY_BROKER: redis://redis:6379/2

      # Mail settings
      PRETIX_MAIL_FROM: ${MAIL_FROM:-noreply@example.com}
      PRETIX_MAIL_HOST: ${MAIL_HOST:-localhost}
      PRETIX_MAIL_PORT: ${MAIL_PORT:-587}
      PRETIX_MAIL_USER: ${MAIL_USER:-}
      PRETIX_MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      PRETIX_MAIL_TLS: ${MAIL_TLS:-off}
      PRETIX_MAIL_SSL: ${MAIL_SSL:-off}
    volumes:
      - pretix-data:/data
    expose:
      - "80"

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - pretix-database:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: pretix
      POSTGRES_DB: pretix

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - pretix-redis:/data

volumes:
  pretix-database:
  pretix-data:
  pretix-redis:
